# Déploie le site web/ sur GitHub Pages → https://<user>.github.io/mpp-prono-agent/
# Nécessite : repo PUBLIC (plan gratuit) + Pages activé (Settings → Pages → GitHub Actions)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/daily_predictions.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily pronos CDM"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync latest predictions into web
        run: python scripts/sync_web.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
