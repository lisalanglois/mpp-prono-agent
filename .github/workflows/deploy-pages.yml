# Déploie le site web/ sur GitHub Pages → https://<user>.github.io/mpp-prono-agent/
# Nécessite : repo PUBLIC (plan gratuit) + Pages activé (Settings → Pages → GitHub Actions)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/daily_predictions.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily pronos CDM"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync latest predictions into web
        run: |
          if [ -f data/daily_predictions.json ]; then
            python3 -c "
          import json
          from pathlib import Path
          daily = json.loads(Path('data/daily_predictions.json').read_text())
          matches = json.loads(Path('web/matches.json').read_text())
          by_key = {m['home'] + ' - ' + m['away']: m for m in matches}
          for p in daily.get('predictions', []):
              k = p.get('match')
              if k in by_key and 'score' in p:
                  h, a = p['score'].split('-')
                  by_key[k]['suggested'] = p['score']
                  by_key[k]['today'] = True
          out = list(by_key.values())
          out.sort(key=lambda x: (x['date'].split('/')[1], x['date'].split('/')[0]))
          meta = {'updated': daily.get('generated_at'), 'site': 'mpp-prono-agent'}
          Path('web/meta.json').write_text(json.dumps(meta, indent=2))
          Path('web/matches.json').write_text(json.dumps(out, ensure_ascii=False, indent=2))
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
