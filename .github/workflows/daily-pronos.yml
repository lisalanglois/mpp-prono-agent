# Génère les pronos du jour (ESPN) et commit le JSON sur main.
# Note : GitHub Pages indisponible sur repo privé (plan gratuit) — pas de job pages.

name: Daily pronos CDM

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-pronos
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily predictions
        run: python scripts/export_daily.py --days 3

      - name: Commit predictions if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_predictions.json web/matches.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: pronos du jour $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload pronos (artifact téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: pronos-du-jour
          path: |
            data/daily_predictions.json
            web/matches.json
          retention-days: 14
